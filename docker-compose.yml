version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: nexora-db
    environment:
      MYSQL_DATABASE: nexora
      MYSQL_ROOT_PASSWORD: darshil6410
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexora-backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      # Override the database URL to point to the 'db' container instead of localhost
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/nexora?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=darshil6410

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: nexora-frontend
    ports:
      - "3000:80" # Maps port 3000 on your machine to port 80 in the Nginx container
    depends_on:
      - backend

volumes:
  db_data:
